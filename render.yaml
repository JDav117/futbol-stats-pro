services:
  - type: web
    name: futbol-stats-pro
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: futbol-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"

databases:
  - name: futbol-db
    plan: free
    databaseName: futbol_db
    user: postgres
