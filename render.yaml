# render.yaml — Blueprint de infraestructura para Render
# Automatiza la creación del Web Service y la base de datos PostgreSQL gestionada.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: futbol-stats-pro
    env: node
    plan: free
    # Render ejecuta esto en la raíz del repositorio
    buildCommand: npm install
    startCommand: npm start
    # Health check: Render monitorea este endpoint para confirmar que el servicio está UP
    healthCheckPath: /api/health
    # Auto-deploy solo después de que el pipeline de CI pase en verde
    autoDeploy: true
    envVars:
      # Render inyecta automáticamente el connection string de la BD gestionada
      - key: DATABASE_URL
        fromDatabase:
          name: futbol-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

databases:
  # Base de datos PostgreSQL gestionada por Render (backups, actualizaciones automáticas)
  - name: futbol-db
    plan: free
    databaseName: futbol_db
    user: postgres
