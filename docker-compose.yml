services:
  backend:
    build: .
    container_name: futbol-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # ✅ FIX ERROR 5: La URL ahora usa 'db_futbol' (nombre del servicio en esta
      # red de Compose) en vez de 'localhost'. Dentro de un contenedor, 'localhost'
      # apunta al contenedor mismo, no al servicio de Postgres.
      - DATABASE_URL=postgresql://postgres:password123@db_futbol:5432/futbol_db
    depends_on:
      db_futbol:
        condition: service_healthy

  db_futbol:
    image: postgres:15-alpine
    container_name: futbol-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: futbol_db
    ports:
      - "5432:5432"
    # Health check para que el backend espere a que Postgres esté listo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      # ✅ FIX ERROR 6: Ruta corregida a /var/lib/postgresql/data, que es donde
      # Postgres almacena sus datos. /data/db es la ruta de MongoDB.
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
